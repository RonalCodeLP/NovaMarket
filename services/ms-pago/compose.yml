name: market-ms-pago-prod

services:
  postgres-pago:
    image: postgres:16-alpine
    container_name: market-postgres-pago
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    volumes:
      - market_pago_data:/var/lib/postgresql/data
    ports:
      - "25435:5432"
    networks:
      - market-pago-int

  ms-pago:
    build: .
    container_name: market-ms-pago
    restart: unless-stopped
    depends_on:
      postgres-pago:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      CONFIG_SERVER_URL: ${CONFIG_SERVER_URL}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      DB_HOST: market-postgres-pago
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
    volumes:
      - ./logs:/app/logs
    networks:
      - market-pago-int
      - market-prod-net

volumes:
  market_pago_data:

networks:
  market-prod-net:
    external: true
    name: market-prod-net
  market-pago-int:
    name: market-pago-int
