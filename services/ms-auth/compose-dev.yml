name: market-auth-dev

services:
  postgres-auth-dev:
    image: postgres:16-alpine
    container_name: market-postgres-auth-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: market_auth_db
      POSTGRES_USER: market
      POSTGRES_PASSWORD: market
    ports:
      - "15431:5432"
    volumes:
      - market_auth_dev_data:/var/lib/postgresql/data

volumes:
  market_auth_dev_data:
