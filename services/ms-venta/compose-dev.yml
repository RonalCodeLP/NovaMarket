name: market-venta-dev

services:
  postgres-orden-dev:
    image: postgres:16-alpine
    container_name: market-postgres-orden-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: market_orden_db
      POSTGRES_USER: market
      POSTGRES_PASSWORD: market
    ports:
      - "15434:5432"
    volumes:
      - market_orden_dev_data:/var/lib/postgresql/data

volumes:
  market_orden_dev_data:
