global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  - job_name: gateway
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - gateway:8080

  - job_name: ms-articulo
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - ms-articulo:8080

  - job_name: ms-rubro
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - ms-rubro:8080

  - job_name: kafka-exporter
    metrics_path: /metrics
    static_configs:
      - targets:
          - market-kafka-exporter:9308

  - job_name: ms-venta
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - ms-venta:8080

  - job_name: ms-pago
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - ms-pago:8080
