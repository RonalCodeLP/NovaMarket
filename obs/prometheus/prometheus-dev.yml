# Gateway (18080) expone spring_cloud_gateway_* y http_client_* — NO http_server_requests_*.
# Microservicios servlet usan http_server_requests_seconds_count.
# Consultas: obs/prometheus/QUERIES-DEV.md

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  - job_name: gateway-dev
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:18080

  - job_name: ms-articulo-dev
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:9091

  - job_name: ms-rubro-dev
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:8081

  - job_name: kafka-exporter-dev
    metrics_path: /metrics
    static_configs:
      - targets:
          - host.docker.internal:41308

  - job_name: ms-venta-dev
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:19051

  - job_name: ms-pago-dev
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:19061
