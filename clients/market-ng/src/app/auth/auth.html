<div class="auth-layout">
  <div class="auth-panel">
    <div class="auth-brand">
      <img
        class="auth-logo-img"
        src="assets/brand/novamarket-logo.svg"
        alt="NovaMarket"
        width="320"
        height="150"
      />
      <p>Sistema de punto de venta para minimarket</p>
    </div>
  </div>

  <div class="auth-form-side">
    <div class="auth-card nm-card">
      @if (sinAcceso()) {
        <h2>Sin acceso al sistema</h2>
        <p class="nm-alert nm-alert-error">
          Su cuenta no tiene permisos para acceder al sistema.
          Solicite acceso al administrador o inicie sesión con otra cuenta.
        </p>
        <button type="button" class="nm-btn nm-btn-primary nm-btn-block" (click)="logout()">
          Cerrar sesión e intentar con otra cuenta
        </button>
      } @else {
        <div class="auth-card-header">
          <img class="auth-icon" src="assets/brand/novamarket-icon.svg" alt="" width="44" height="44" />
          <div>
            <h2>Iniciar sesión</h2>
            <p class="nm-muted">Acceso seguro con su usuario de tienda</p>
          </div>
        </div>

        <div class="auth-form">
          <p class="nm-alert nm-alert-error" *ngIf="error()">{{ error() }}</p>

          <button
            type="button"
            class="nm-btn nm-btn-primary nm-btn-block nm-btn-keycloak"
            [disabled]="loading()"
            (click)="loginWithKeycloak()"
          >
            @if (loading()) {
              <span class="kc-spinner" aria-hidden="true"></span>
              Redirigiendo...
            } @else {
              <span class="kc-icon" aria-hidden="true">
                <svg width="20" height="20" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path d="M16 2L4 8v16l12 6 12-6V8L16 2z" fill="#fff" fill-opacity=".15" stroke="#fff" stroke-width="1.5"/>
                  <path d="M16 8l-6 3.5v7L16 22l6-3.5v-7L16 8z" fill="#fff"/>
                </svg>
              </span>
              Entrar con Keycloak
            }
          </button>
        </div>
      }
    </div>
  </div>
</div>
