<div class="auth-layout">
  <div class="auth-panel">
    <div class="auth-brand">
      <span class="auth-logo">NM</span>
      <h1>NovaMarket</h1>
      <p>Sistema de punto de venta para minimarket</p>
    </div>
  </div>

  <div class="auth-form-side">
    <div class="auth-card nm-card">
      <h2>Iniciar sesión</h2>
      <p class="nm-muted">Use sus credenciales de cajero o administrador</p>

      <form (ngSubmit)="login()" class="auth-form">
        <div class="nm-field">
          <label class="nm-label" for="username">Usuario</label>
          <input
            id="username"
            class="nm-input"
            type="text"
            name="username"
            [(ngModel)]="username"
            placeholder="cajero"
            autocomplete="username"
            required
          />
        </div>

        <div class="nm-field">
          <label class="nm-label" for="password">Contraseña</label>
          <input
            id="password"
            class="nm-input"
            type="password"
            name="password"
            [(ngModel)]="password"
            placeholder="••••••••"
            autocomplete="current-password"
            required
          />
        </div>

        <p class="nm-alert nm-alert-error" *ngIf="error()">{{ error() }}</p>

        <button type="submit" class="nm-btn nm-btn-primary nm-btn-block" [disabled]="loading()">
          {{ loading() ? 'Ingresando...' : 'Entrar al sistema' }}
        </button>
      </form>

      <p class="auth-demo nm-muted">
        Demo: <code>cajero</code> / <code>cajero123</code>
      </p>
    </div>
  </div>
</div>
