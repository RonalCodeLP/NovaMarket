<div class="auth-layout">
  <div class="auth-panel">
    <div class="auth-brand">
      <span class="auth-logo">NM</span>
      <h1>NovaMarket</h1>
      <p>Sistema de punto de venta para minimarket</p>
    </div>
  </div>

  <div class="auth-form-side">
    <div class="auth-card nm-card">
      <h2>Iniciar sesión</h2>
      <p class="nm-muted">Autenticación centralizada con Keycloak (OAuth2 / OIDC)</p>

      <div class="auth-form">
        <p class="nm-alert nm-alert-error" *ngIf="error()">{{ error() }}</p>

        <button
          type="button"
          class="nm-btn nm-btn-primary nm-btn-block"
          [disabled]="loading()"
          (click)="loginWithKeycloak()"
        >
          {{ loading() ? 'Redirigiendo...' : 'Entrar con Keycloak' }}
        </button>
      </div>

      <p class="auth-demo nm-muted">
        Demo en Keycloak: <code>cajero</code> / <code>cajero123</code> o <code>admin</code> / <code>admin123</code>
      </p>
    </div>
  </div>
</div>
