site_name: NovaMarket — Documentación
site_description: Plataforma de microservicios — Minimarket POS
docs_dir: docs

nav:
  - Inicio: index.md
  - Guía del proyecto:
      - Arquitectura: arquitectura.md
      - Desarrollo (DEV): desarrollo.md
      - Producción (PROD): produccion.md
      - Seguridad (Keycloak): seguridad.md
      - Observabilidad: observabilidad.md
      - Kafka y eventos: kafka-eventos.md
      - Dominio de negocio: dominio-negocio.md
      - Puertos: puertos.md
  - Evaluación:
      - Plantilla de informe: informe-template.md
      - Rúbrica: rubrica-evaluacion.md
  - Material del curso (histórico):
      - s00-infraestructura: sesiones/s00-infraestructura.md
      - s04-gateway: sesiones/s04-gateway.md
      - s05-observabilidad: sesiones/s05-observabilidad.md
      - s06-seguridad: sesiones/s06-seguridad.md
      - s07-kafka: sesiones/s07-kafka-ingesta.md
      - Labs: labs/README.md

theme:
  name: material
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - content.code.copy

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details

plugins:
  - search

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js
  - javascripts/mermaid.js
