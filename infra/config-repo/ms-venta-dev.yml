server:
  port: 19051
  forward-headers-strategy: framework

app:
  kafka:
    enabled: false

spring:
  cloud:
    openfeign:
      client:
        config:
          default:
            connectTimeout: 2000
            readTimeout: 5000
          ms-pago:
            url: http://localhost:19061
          ms-articulo:
            url: http://localhost:9091
  kafka:
    bootstrap-servers: localhost:41092
  datasource:
    url: jdbc:postgresql://localhost:15434/market_orden_db
    username: market
    password: market
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: false

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  devtools:
    restart:
      enabled: true
    livereload:
      enabled: true

eureka:
  instance:
    hostname: ${EUREKA_INSTANCE_HOSTNAME:localhost}
    prefer-ip-address: false
    instance-id: ${spring.application.name}:${server.port}
  client:
    service-url:
      defaultZone: http://localhost:18761/eureka

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    config-url: /ms-venta/v3/api-docs/swagger-config
    url: /ms-venta/v3/api-docs
  cache:
    disabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  prometheus:
    metrics:
      export:
        enabled: true
