name: market-keycloak-dev

services:

  postgres-keycloak-dev:
    image: postgres:16-alpine
    container_name: market-postgres-keycloak-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: keycloak_db
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak_db"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s
    volumes:
      - market_keycloak_pg_dev_data:/var/lib/postgresql/data
    networks:
      market-dev-net:
        aliases:
          - postgres-keycloak-dev

  keycloak:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: market-keycloak-dev:local
    container_name: market-keycloak-dev
    restart: unless-stopped
    command: start-dev --import-realm --http-enabled=true --hostname-strict=false --hostname=http://localhost:41880
    depends_on:
      postgres-keycloak-dev:
        condition: service_healthy
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_BOOTSTRAP_ADMIN_USERNAME:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_BOOTSTRAP_ADMIN_PASSWORD:-admin}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres-keycloak-dev:5432/keycloak_db
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      JAVA_OPTS_APPEND: "-Xms512m -Xmx1536m"
    ports:
      - "41880:8080"
    volumes:
      - ./realm:/opt/keycloak/data/import:ro
    networks:
      market-dev-net:
        aliases:
          - keycloak

volumes:
  market_keycloak_pg_dev_data:

networks:
  market-dev-net:
    external: true
    name: market-dev-net
